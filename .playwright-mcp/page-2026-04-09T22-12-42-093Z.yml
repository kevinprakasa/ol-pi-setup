                - paragraph [ref=e1908]:
                  - text: Agent definitions are not loaded into LLM context by default. Management actions let the LLM discover, inspect, create, and modify agent and chain definitions at runtime through the
                  - code [ref=e1909]: subagent
                  - text: tool — no manual file editing or restart required. Newly created agents are immediately usable in the same session. Set
                  - code [ref=e1910]: action
                  - text: and omit execution payloads (
                  - code [ref=e1911]: task
                  - text: ","
                  - code [ref=e1912]: chain
                  - text: ","
                  - code [ref=e1913]: tasks
                  - text: ).
                - generic [ref=e1914]:
                  - generic [ref=e1915]: "// Discover all agents and chains (management defaults to both scopes) { action: \"list\" } { action: \"list\", agentScope: \"project\" } // Inspect one agent or chain (searches both scopes) { action: \"get\", agent: \"scout\" } { action: \"get\", chainName: \"review-pipeline\" } // Create agent { action: \"create\", config: { name: \"Code Scout\", description: \"Scans codebases for patterns and issues\", scope: \"user\", systemPrompt: \"You are a code scout...\", model: \"anthropic/claude-sonnet-4\", tools: \"read, bash, mcp:github/search_repositories\", extensions: \"\", // empty = no extensions skills: \"parallel-scout\", thinking: \"high\", output: \"context.md\", reads: \"shared-context.md\", progress: true }} // Create chain (presence of steps creates .chain.md) { action: \"create\", config: { name: \"review-pipeline\", description: \"Scout then review\", scope: \"project\", steps: [ { agent: \"scout\", task: \"Scan {task}\", output: \"context.md\" }, { agent: \"reviewer\", task: \"Review {previous}\", reads: [\"context.md\"] } ] }} // Update agent fields (merge semantics) { action: \"update\", agent: \"scout\", config: { model: \"openai/gpt-4o\" } } { action: \"update\", agent: \"scout\", config: { output: false, skills: \"\" } } // clear optional fields { action: \"update\", chainName: \"review-pipeline\", config: { steps: [ { agent: \"scout\", task: \"Scan {task}\", output: \"context.md\" }, { agent: \"reviewer\", task: \"Improved review of {previous}\", reads: [\"context.md\"] } ] }} // Delete definitions { action: \"delete\", agent: \"scout\" } { action: \"delete\", chainName: \"review-pipeline\" }"
                  - button "Copy" [ref=e1917] [cursor=pointer]:
