                  - text: Then
                  - code [ref=e1132]: /take-screenshot https://example.com
                  - text: switches to Sonnet, delegates to the
                  - code [ref=e1133]: browser-screenshoter
                  - text: agent with
                  - code [ref=e1134]: /tmp/screenshots
                  - text: as the working directory, and restores your model when done. Runtime overrides like
                  - code [ref=e1135]: "--cwd=<path>"
                  - text: and
                  - code [ref=e1136]: "--subagent=<name>"
                  - text: work too.
                - paragraph [ref=e1137]:
                  - text: pi-prompt-template-model is entirely optional — pi-subagents works standalone through the
                  - code [ref=e1138]: subagent
                  - text: tool and slash commands. If you want reusable prompt-template workflows on top of subagents, including
                  - code [ref=e1139]: /chain-prompts
                  - text: and compare-style prompts like
                  - code [ref=e1140]: pi-prompt-template-model
                  - text: "'s"
                  - code [ref=e1141]: /best-of-n
                  - text: example, install
                  - link "pi-prompt-template-model" [ref=e1142] [cursor=pointer]:
                    - /url: https://github.com/nicobailon/pi-prompt-template-model
                  - text: separately and copy any example prompts you want from its
                  - code [ref=e1143]: examples/
                  - text: directory into
                  - code [ref=e1144]: ~/.pi/agent/prompts/
                  - text: .
                - generic [ref=e1145]:
                  - heading "Agents" [level=2] [ref=e1146]
                  - 'link "Permalink: Agents" [ref=e1147] [cursor=pointer]':
                    - /url: "#agents"
                    - img [ref=e1148]
                - paragraph [ref=e1150]: Agents are markdown files with YAML frontmatter that define specialized subagent configurations.
                - paragraph [ref=e1151]:
                  - strong [ref=e1152]: "Agent file locations:"
                - table [ref=e1154]:
                  - rowgroup [ref=e1155]:
                    - row "Scope Path Priority" [ref=e1156]:
                      - columnheader "Scope" [ref=e1157]
                      - columnheader "Path" [ref=e1158]
                      - columnheader "Priority" [ref=e1159]
                  - rowgroup [ref=e1160]:
                    - row "Builtin ~/.pi/agent/extensions/subagent/agents/ Lowest" [ref=e1161]:
                      - cell "Builtin" [ref=e1162]
                      - cell "~/.pi/agent/extensions/subagent/agents/" [ref=e1163]:
                        - code [ref=e1164]: ~/.pi/agent/extensions/subagent/agents/
                      - cell "Lowest" [ref=e1165]
                    - 'row "User ~/.pi/agent/agents/{name}.md Medium" [ref=e1166]':
                      - cell "User" [ref=e1167]
                      - 'cell "~/.pi/agent/agents/{name}.md" [ref=e1168]':
                        - code [ref=e1169]: "~/.pi/agent/agents/{name}.md"
                      - cell "Medium" [ref=e1170]
                    - 'row "Project .pi/agents/{name}.md (searches up directory tree) Highest" [ref=e1171]':
                      - cell "Project" [ref=e1172]
                      - 'cell ".pi/agents/{name}.md (searches up directory tree)" [ref=e1173]':
                        - code [ref=e1174]: ".pi/agents/{name}.md"
                        - text: (searches up directory tree)
                      - cell "Highest" [ref=e1175]
                - paragraph [ref=e1176]:
                  - text: Use
                  - code [ref=e1177]: agentScope
                  - text: "parameter to control discovery:"
                  - code [ref=e1178]: "\"user\""
                  - text: ","
                  - code [ref=e1179]: "\"project\""
                  - text: ", or"
                  - code [ref=e1180]: "\"both\""
                  - text: (default; project takes priority).
                - paragraph [ref=e1181]:
                  - strong [ref=e1182]: "Builtin agents:"
                  - text: The extension ships with ready-to-use agents —
                  - code [ref=e1183]: scout
                  - text: ","
                  - code [ref=e1184]: planner
                  - text: ","
                  - code [ref=e1185]: worker
                  - text: ","
                  - code [ref=e1186]: reviewer
                  - text: ","
                  - code [ref=e1187]: context-builder
                  - text: ","
                  - code [ref=e1188]: researcher
                  - text: ", and"
                  - code [ref=e1189]: delegate
                  - text: . They load at lowest priority so any user or project agent with the same name overrides them. Builtin agents appear with a
                  - code [ref=e1190]: "[builtin]"
                  - text: badge in listings and cannot be modified through management actions (create a same-named user agent to override instead).
                - blockquote [ref=e1191]:
                  - paragraph [ref=e1192]:
                    - strong [ref=e1193]: "Note:"
                    - text: The
                    - code [ref=e1194]: researcher
                    - text: agent uses
                    - code [ref=e1195]: web_search
                    - text: ","
                    - code [ref=e1196]: fetch_content
                    - text: ", and"
                    - code [ref=e1197]: get_search_content
                    - text: tools which require the
                    - link "pi-web-access" [ref=e1198] [cursor=pointer]:
                      - /url: https://github.com/nicobailon/pi-web-access
                    - text: extension. Install it with
                    - code [ref=e1199]: pi install npm:pi-web-access
                    - text: .
                - paragraph [ref=e1200]:
                  - strong [ref=e1201]: "Agent frontmatter:"
                - generic [ref=e1202]:
                  - generic [ref=e1203]:
                    - text: "--- name: scout description: Fast codebase recon tools: read, grep, find, ls, bash, mcp:chrome-devtools"
                    - generic [ref=e1204]: "# mcp: requires pi-mcp-adapter"
                    - text: "extensions:"
                    - generic [ref=e1205]: "# absent=all, empty=none, csv=allowlist"
                    - text: "model: claude-haiku-4-5 thinking: high"
                    - generic [ref=e1206]: "# off, minimal, low, medium, high, xhigh"
                    - text: "skill: safe-bash, chrome-devtools"
                    - generic [ref=e1207]: "# comma-separated skills to inject"
                    - text: "output: context.md"
                    - generic [ref=e1208]: "# writes to {chain_dir}/context.md"
                    - text: "defaultReads: context.md"
                    - generic [ref=e1209]: "# comma-separated files to read"
                    - text: "defaultProgress: true"
                    - generic [ref=e1210]: "# maintain progress.md"
                    - text: "interactive: true"
                    - generic [ref=e1211]: "# (parsed but not enforced in v1)"
                    - text: "maxSubagentDepth: 1"
                    - generic [ref=e1212]: "# tighten nested delegation for this agent's children"
                    - text: "--- Your system prompt goes here (the markdown body after frontmatter)."
                  - button "Copy" [ref=e1214] [cursor=pointer]:
                    - img [ref=e1215]
                - paragraph [ref=e1218]:
                  - text: The
                  - code [ref=e1219]: thinking
                  - text: field sets a default extended thinking level for the agent. At runtime it's appended as a
                  - code [ref=e1220]: :level
                  - text: suffix to the model string (e.g.,
                  - code [ref=e1221]: claude-sonnet-4-5:high
                  - text: ). If the model already has a thinking suffix (from a chain-clarify override), the agent's default is not double-applied.
                - paragraph [ref=e1222]:
                  - strong [ref=e1223]: Extension sandboxing
                - paragraph [ref=e1224]:
                  - text: Use
                  - code [ref=e1225]: extensions
                  - text: "in frontmatter to control which extensions a subagent can access:"
                - generic [ref=e1226]:
                  - generic [ref=e1227]:
                    - generic [ref=e1228]: "# Field absent: all extensions load (default behavior)"
                    - generic [ref=e1229]: "# Empty field: no extensions"
                    - text: "extensions:"
                    - generic [ref=e1230]: "# Allowlist specific extensions"
                    - text: "extensions: /abs/path/to/ext-a.ts, /abs/path/to/ext-b.ts"
                  - button "Copy" [ref=e1232] [cursor=pointer]:
                    - img [ref=e1233]
                - paragraph [ref=e1236]: "Semantics:"
                - list [ref=e1237]:
                  - listitem [ref=e1238]:
                    - code [ref=e1239]: extensions
                    - text: absent → all extensions load
                  - listitem [ref=e1240]:
                    - code [ref=e1241]: "extensions:"
                    - text: empty →
                    - code [ref=e1242]: "--no-extensions"
                  - listitem [ref=e1243]:
                    - code [ref=e1244]: "extensions: a,b"
                    - text: →
                    - code [ref=e1245]: "--no-extensions --extension a --extension b"
                - paragraph [ref=e1246]:
                  - text: When
                  - code [ref=e1247]: extensions
                  - text: is present, it takes precedence over extension paths implied by
                  - code [ref=e1248]: tools
                  - text: entries.
                - paragraph [ref=e1249]:
                  - strong [ref=e1250]: MCP Tools (optional)
                - paragraph [ref=e1251]:
                  - text: If you have the
                  - link "pi-mcp-adapter" [ref=e1252] [cursor=pointer]:
