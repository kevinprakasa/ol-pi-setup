                    - /url: https://github.com/nicobailon/pi-prompt-template-model
                  - text: ", you can wrap subagent delegation in a slash command:"
                - generic [ref=e1124]:
                  - generic [ref=e1125]: "--- description: Take a screenshot model: claude-sonnet-4-20250514 subagent: browser-screenshoter cwd: /tmp/screenshots --- Use url in the prompt to take screenshot: $@"
                  - button "Copy" [ref=e1127] [cursor=pointer]:
                    - img [ref=e1128]
