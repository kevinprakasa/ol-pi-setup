                - paragraph [ref=e1880]:
                  - strong [ref=e1881]: "subagent tool parameters:"
                - generic [ref=e1882]:
                  - generic [ref=e1883]:
                    - text: "// Single agent { agent: \"worker\", task: \"refactor auth\" } { agent: \"scout\", task: \"find todos\", maxOutput: { lines: 1000 } } { agent: \"scout\", task: \"investigate\", output: false } // disable file output // Single agent from parent-session fork (real branched session at current leaf) { agent: \"worker\", task: \"continue this thread\", context: \"fork\" } // Parallel { tasks: [{ agent: \"scout\", task: \"a\" }, { agent: \"scout\", task: \"b\" }] } // Parallel with count shorthand (run the same task 3 times) { tasks: [{ agent: \"scout\", task: \"audit auth\", count: 3 }] } // Parallel with forked context (each task gets its own isolated fork) { tasks: [{ agent: \"scout\", task: \"audit frontend\" }, { agent: \"reviewer\", task: \"audit backend\" }], context: \"fork\" } // Chain with TUI clarification (default) { chain: [ { agent: \"scout\", task: \"Gather context for auth refactor\" }, { agent: \"planner\" }, // task defaults to {previous} { agent: \"worker\" }, // uses agent defaults for reads/progress { agent: \"reviewer\" } ]} // Chain with forked context (each step gets its own isolated fork of the same parent leaf) { chain: [ { agent: \"scout\", task: \"Analyze current branch decisions\" }, { agent: \"planner\", task: \"Plan from {previous}\" } ], context: \"fork\" } // Chain without TUI (enables async) { chain: [..."
                    - text: "], clarify: false, async: true } // Chain with behavior overrides { chain: [ { agent: \"scout\", task: \"find issues\", output: false }, // text-only, no file { agent: \"worker\", progress: false } // disable progress tracking ]} // Chain with parallel step (fan-out/fan-in) { chain: [ { agent: \"scout\", task: \"Gather context for the codebase\" }, { parallel: [ { agent: \"worker\", task: \"Implement auth based on {previous}\", count: 2 }, { agent: \"worker\", task: \"Implement API based on {previous}\" } ]}, { agent: \"reviewer\", task: \"Review all changes from {previous}\" } ]} // Parallel step with options { chain: [ { agent: \"scout\", task: \"Find all modules\" }, { parallel: [ { agent: \"worker\", task: \"Refactor module A\" }, { agent: \"worker\", task: \"Refactor module B\" }, { agent: \"worker\", task: \"Refactor module C\" } ], concurrency: 2, failFast: true } // limit concurrency, stop on first failure ]} // Worktree isolation — each parallel agent gets its own git worktree { tasks: [ { agent: \"worker\", task: \"Implement auth\" }, { agent: \"worker\", task: \"Implement API\" } ], worktree: true } // Worktree isolation in a chain (fan-out with isolation, fan-in for review) { chain: [ { agent: \"scout\", task: \"Gather context\" }, { parallel: [ { agent: \"worker\", task: \"Implement feature A based on {previous}\" }, { agent: \"worker\", task: \"Implement feature B based on {previous}\" } ], worktree: true }, { agent: \"reviewer\", task: \"Review changes from {previous}\" } ]} // Async chain with parallel step (runs in background) { chain: [ { agent: \"scout\", task: \"Gather context\" }, { parallel: [ { agent: \"worker\", task: \"Implement feature A based on {previous}\" }, { agent: \"worker\", task: \"Implement feature B based on {previous}\" } ]}, { agent: \"reviewer\", task: \"Review all changes from {previous}\" } ], clarify: false, async: true }"
