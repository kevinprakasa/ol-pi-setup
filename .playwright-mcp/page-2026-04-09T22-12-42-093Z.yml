                    - img [ref=e2298]
                - paragraph [ref=e2300]:
                  - text: When multiple agents run in parallel against the same repo, they can clobber each other's file changes. Pass
                  - code [ref=e2301]: "worktree: true"
                  - text: to give each parallel agent its own git worktree branched from HEAD.
                - generic [ref=e2302]:
                  - generic [ref=e2303]: "// Top-level parallel with worktree isolation { tasks: [ { agent: \"worker\", task: \"Implement auth\", count: 2 }, { agent: \"worker\", task: \"Implement API\" } ], worktree: true } // Chain with worktree-isolated parallel step { chain: [ { agent: \"scout\", task: \"Gather context\" }, { parallel: [ { agent: \"worker\", task: \"Implement feature A based on {previous}\" }, { agent: \"worker\", task: \"Implement feature B based on {previous}\" } ], worktree: true }, { agent: \"reviewer\", task: \"Review all changes from {previous}\" } ]}"
                  - button "Copy" [ref=e2305] [cursor=pointer]:
                    - img [ref=e2306]
                - paragraph [ref=e2309]:
                  - text: After the parallel step completes, per-agent diff stats are appended to the output (and become
                  - code [ref=e2310]: "{previous}"
                  - text: for the next chain step). Full patch files are written to disk. The caller or next step can decide what to keep.
                - paragraph [ref=e2311]:
                  - strong [ref=e2312]: "Requirements:"
                - list [ref=e2313]:
                  - listitem [ref=e2314]: Must be inside a git repository
                  - listitem [ref=e2315]: Working tree must be clean (no uncommitted changes) — commit or stash first
                  - listitem [ref=e2316]:
                    - code [ref=e2317]: node_modules/
                    - text: is symlinked into each worktree to avoid reinstalling
                  - listitem [ref=e2318]:
                    - text: Worktree runs use the shared parallel/step
                    - code [ref=e2319]: cwd
                    - text: . Task-level
                    - code [ref=e2320]: cwd
                    - text: overrides must be omitted or match that shared
                    - code [ref=e2321]: cwd
                    - text: ; if you need different working directories, disable
                    - code [ref=e2322]: worktree
                    - text: or split the run.
                  - listitem [ref=e2323]:
                    - text: If
                    - code [ref=e2324]: worktreeSetupHook
                    - text: is configured, it must return valid JSON and complete before timeout
                - paragraph [ref=e2325]:
                  - strong [ref=e2326]: "What happens under the hood:"
                - list [ref=e2327]:
                  - listitem [ref=e2328]:
                    - code [ref=e2329]: git worktree add
                    - text: creates a temporary worktree per agent in
                    - code [ref=e2330]: <tmpdir>/pi-worktree-*
                  - listitem [ref=e2331]:
                    - text: Optional
                    - code [ref=e2332]: worktreeSetupHook
                    - text: runs once per worktree (JSON in on stdin, JSON out on stdout)
                  - listitem [ref=e2333]: Each agent runs in its worktree's cwd (preserving subdirectory context)
                  - listitem [ref=e2334]:
                    - text: Before diff capture, declared synthetic helper paths (for example
                    - code [ref=e2335]: .venv
                    - text: or copied local config files) are removed
                  - listitem [ref=e2336]:
                    - text: After execution,
                    - code [ref=e2337]: git add -A && git diff --cached
                    - text: captures all real changes (committed, modified, and new files)
                  - listitem [ref=e2338]:
                    - text: Diff stats appear in the aggregated output; full
                    - code [ref=e2339]: .patch
                    - text: files are written to the artifacts directory
                  - listitem [ref=e2340]:
                    - text: Worktrees and temp branches are cleaned up in a
                    - code [ref=e2341]: finally
                    - text: block
