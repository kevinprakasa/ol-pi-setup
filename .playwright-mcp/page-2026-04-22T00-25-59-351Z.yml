                  - heading "The Problems" [level=2] [ref=e375]
                  - 'link "Permalink: The Problems" [ref=e376] [cursor=pointer]':
                    - /url: "#the-problems"
                    - img [ref=e377]
                - paragraph [ref=e379]: "From Andrej's post:"
                - blockquote [ref=e380]:
                  - paragraph [ref=e381]: "\"The models make wrong assumptions on your behalf and just run along with them without checking. They don't manage their confusion, don't seek clarifications, don't surface inconsistencies, don't present tradeoffs, don't push back when they should.\""
                - blockquote [ref=e382]:
                  - paragraph [ref=e383]: "\"They really like to overcomplicate code and APIs, bloat abstractions, don't clean up dead code... implement a bloated construction over 1000 lines when 100 would do.\""
                - blockquote [ref=e384]:
                  - paragraph [ref=e385]: "\"They still sometimes change/remove comments and code they don't sufficiently understand as side effects, even if orthogonal to the task.\""
                - generic [ref=e386]:
                  - heading "The Solution" [level=2] [ref=e387]
                  - 'link "Permalink: The Solution" [ref=e388] [cursor=pointer]':
                    - /url: "#the-solution"
                    - img [ref=e389]
                - paragraph [ref=e391]: "Four principles in one file that directly address these issues:"
                - table [ref=e393]:
                  - rowgroup [ref=e394]:
                    - row "Principle Addresses" [ref=e395]:
                      - columnheader "Principle" [ref=e396]
                      - columnheader "Addresses" [ref=e397]
                  - rowgroup [ref=e398]:
                    - row "Think Before Coding Wrong assumptions, hidden confusion, missing tradeoffs" [ref=e399]:
                      - cell "Think Before Coding" [ref=e400]:
                        - strong [ref=e401]: Think Before Coding
                      - cell "Wrong assumptions, hidden confusion, missing tradeoffs" [ref=e402]
                    - row "Simplicity First Overcomplication, bloated abstractions" [ref=e403]:
                      - cell "Simplicity First" [ref=e404]:
                        - strong [ref=e405]: Simplicity First
                      - cell "Overcomplication, bloated abstractions" [ref=e406]
                    - row "Surgical Changes Orthogonal edits, touching code you shouldn't" [ref=e407]:
                      - cell "Surgical Changes" [ref=e408]:
                        - strong [ref=e409]: Surgical Changes
                      - cell "Orthogonal edits, touching code you shouldn't" [ref=e410]
                    - row "Goal-Driven Execution Leverage through tests-first, verifiable success criteria" [ref=e411]:
                      - cell "Goal-Driven Execution" [ref=e412]:
                        - strong [ref=e413]: Goal-Driven Execution
                      - cell "Leverage through tests-first, verifiable success criteria" [ref=e414]
                - generic [ref=e415]:
                  - heading "The Four Principles in Detail" [level=2] [ref=e416]
                  - 'link "Permalink: The Four Principles in Detail" [ref=e417] [cursor=pointer]':
                    - /url: "#the-four-principles-in-detail"
                    - img [ref=e418]
                - generic [ref=e420]:
                  - heading "1. Think Before Coding" [level=3] [ref=e421]
                  - 'link "Permalink: 1. Think Before Coding" [ref=e422] [cursor=pointer]':
                    - /url: "#1-think-before-coding"
                    - img [ref=e423]
                - paragraph [ref=e425]:
                  - strong [ref=e426]: Don't assume. Don't hide confusion. Surface tradeoffs.
                - paragraph [ref=e427]: "LLMs often pick an interpretation silently and run with it. This principle forces explicit reasoning:"
                - list [ref=e428]:
                  - listitem [ref=e429]:
                    - strong [ref=e430]: State assumptions explicitly
                    - text: — If uncertain, ask rather than guess
                  - listitem [ref=e431]:
                    - strong [ref=e432]: Present multiple interpretations
                    - text: — Don't pick silently when ambiguity exists
                  - listitem [ref=e433]:
                    - strong [ref=e434]: Push back when warranted
                    - text: — If a simpler approach exists, say so
                  - listitem [ref=e435]:
                    - strong [ref=e436]: Stop when confused
                    - text: — Name what's unclear and ask for clarification
                - generic [ref=e437]:
                  - heading "2. Simplicity First" [level=3] [ref=e438]
                  - 'link "Permalink: 2. Simplicity First" [ref=e439] [cursor=pointer]':
                    - /url: "#2-simplicity-first"
                    - img [ref=e440]
                - paragraph [ref=e442]:
                  - strong [ref=e443]: Minimum code that solves the problem. Nothing speculative.
                - paragraph [ref=e444]: "Combat the tendency toward overengineering:"
                - list [ref=e445]:
                  - listitem [ref=e446]: No features beyond what was asked
                  - listitem [ref=e447]: No abstractions for single-use code
                  - listitem [ref=e448]: No "flexibility" or "configurability" that wasn't requested
                  - listitem [ref=e449]: No error handling for impossible scenarios
                  - listitem [ref=e450]: If 200 lines could be 50, rewrite it
                - paragraph [ref=e451]:
                  - strong [ref=e452]: "The test:"
                  - text: Would a senior engineer say this is overcomplicated? If yes, simplify.
