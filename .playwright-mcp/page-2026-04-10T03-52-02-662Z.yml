                    - img [ref=e163]
                - listitem [ref=e165]:
                  - generic [ref=e166]: Figma MCP Server
                - listitem [ref=e167]:
                  - generic [ref=e168]: Installation & setup
                - listitem [ref=e169]:
                  - generic [ref=e170]: Set up the remote server (recommended)
            - generic [ref=e171]:
              - heading "Set up the remote server (recommended)" [level=1] [ref=e173]
              - paragraph [ref=e176]:
                - strong [ref=e177]: "Note:"
                - text: Only clients listed in the
                - link "Figma MCP Catalog" [ref=e178] [cursor=pointer]:
                  - /url: https://www.figma.com/mcp-catalog/
                - text: like VS Code, Cursor, or Claude Code can connect to the Figma MCP Server. If you're a developer interested in connecting a new MCP client, you can
                - link "join the waitlist" [ref=e179] [cursor=pointer]:
                  - /url: https://form.asana.com/?k=kBG-ejRQTdY8x_H6a4vM3Q&d=10497086658021
                - text: .
              - paragraph [ref=e180]: The Figma MCP server brings Figma directly into your workflow by providing important design information and context to AI agents generating code from Figma design files.
              - paragraph [ref=e181]:
                - text: MCP servers are part of a standardized interface for AI agents to interact with data sources using the
                - link "Model Context Protocol" [ref=e182] [cursor=pointer]:
                  - /url: https://modelcontextprotocol.io/
                - text: .
              - paragraph [ref=e183]: Figma's remote MCP server makes it possible to connect directly to your Figma files without needing to install Figma's desktop app. You can capture live UI to Figma Design and bring design context into your workflow wherever you're working.
              - paragraph [ref=e184]: "With the server enabled, you can:"
              - list [ref=e185]:
                - listitem [ref=e186]:
                  - paragraph [ref=e187]:
                    - strong [ref=e188]: Write to canvas
                    - text: ": Use a supported MCP client to create and modify native Figma content directly in Figma Design files. Agents can build and update frames, components, variables, and auto layout using your existing design system and file structure as context."
                  - paragraph [ref=e191]:
                    - strong [ref=e192]: "Note:"
                    - text: We're quickly improving how Figma supports AI agents. This will eventually be a usage-based paid feature, but is currently available for free during the beta period.
                - listitem [ref=e193]:
                  - paragraph [ref=e194]:
                    - strong [ref=e195]: Generate designs from live UI
                    - text: ": Use a supported MCP client to capture the live UI of your web app or site and send it to new and existing Figma files or your clipboard. ("
                    - link "select clients only" [ref=e196] [cursor=pointer]:
                      - /url: /docs/figma-mcp-server/code-to-canvas/
                    - text: )
                - listitem [ref=e197]:
                  - paragraph [ref=e198]:
                    - strong [ref=e199]: Generate code from selected frames
                    - text: ": Select a Figma frame and turn it into code. Great for product teams building new flows or iterating on app features."
                - listitem [ref=e200]:
                  - paragraph [ref=e201]:
                    - strong [ref=e202]: Extract design context
                    - text: ": Pull in variables, components, and layout data directly into your IDE. This is especially useful for design systems and component-based workflows."
                - listitem [ref=e203]:
                  - paragraph [ref=e204]:
                    - strong [ref=e205]: Retrieve Make resources
                    - text: ":"
                    - link "Gather code resources from Make files" [ref=e206] [cursor=pointer]:
                      - /url: https://developers.figma.com/docs/figma-mcp-server/bringing-make-context-to-your-agent/
                    - text: and provide them to the LLM as context. This can help as you move from prototype to production application.
                - listitem [ref=e207]:
                  - paragraph [ref=e208]:
                    - strong [ref=e209]: Keep your design system components consistent with Code Connect
                    - text: ": Boost output quality by reusing your actual components. Code Connect keeps your generated code consistent with your codebase."
              - paragraph [ref=e210]: To use this server, you'll need to sign in through Figma's OAuth authentication flow. Once set up, the remote server gives you a seamless way to access Figma data and integrate it with your tools.
              - heading "Enabling the remote MCP serverDirect link to Enabling the remote MCP server" [level=2] [ref=e211]:
                - text: Enabling the remote MCP server
                - link "Direct link to Enabling the remote MCP server" [ref=e212] [cursor=pointer]:
                  - /url: "#enabling-the-remote-mcp-server"
                  - text: "#"
              - paragraph [ref=e215]:
                - text: This documentation covers the installation steps for several of our supported MCP clients. For a list of install guides for supported MCP clients, see the
                - link "Guide to the Figma MCP server" [ref=e216] [cursor=pointer]:
                  - /url: https://help.figma.com/hc/en-us/articles/32132100833559#h_01K25F7RBRZKCATVJHNXCS6KXW
                - text: .
              - paragraph [ref=e217]: "Follow the steps for your MCP client:"
              - list [ref=e218]:
                - listitem [ref=e219]:
                  - link "Claude Code" [ref=e220] [cursor=pointer]:
                    - /url: "#claude-code"
                - listitem [ref=e221]:
                  - link "Codex by OpenAI" [ref=e222] [cursor=pointer]:
                    - /url: "#codex"
                - listitem [ref=e223]:
                  - link "Cursor" [ref=e224] [cursor=pointer]:
                    - /url: "#cursor"
                - listitem [ref=e225]:
                  - link "VS Code" [ref=e226] [cursor=pointer]:
                    - /url: "#vs-code"
              - heading "Claude CodeDirect link to Claude Code" [level=3] [ref=e227]:
                - text: Claude Code
                - link "Direct link to Claude Code" [ref=e228] [cursor=pointer]:
                  - /url: "#claude-code"
                  - text: "#"
              - heading "Using the Figma plugin for Claude Code (preferred):Direct link to Using the Figma plugin for Claude Code (preferred):" [level=4] [ref=e229]:
                - text: "Using the Figma plugin for Claude Code (preferred):"
                - link "Direct link to Using the Figma plugin for Claude Code (preferred):" [ref=e230] [cursor=pointer]:
                  - /url: "#using-the-figma-plugin-for-claude-code-preferred"
                  - text: "#"
              - paragraph [ref=e231]: The recommended way to set up the Figma MCP server in Claude Code is by installing the Figma plugin, which includes MCP server settings as well as Agent Skills for common workflows.
              - paragraph [ref=e232]: Run the following command to install the plugin from Anthropic's official plugin marketplace.
              - generic [ref=e234]:
                - code [ref=e236]:
                  - generic [ref=e237]: claude plugin install figma@claude-plugins-official
                - button "Copy code to clipboard" [ref=e239] [cursor=pointer]:
                  - generic [ref=e240]:
                    - img [ref=e241]
                    - img [ref=e243]
              - paragraph [ref=e245]:
                - text: Learn more about Anthropic's
                - link "Claude Code plugins" [ref=e246] [cursor=pointer]:
                  - /url: https://claude.com/blog/claude-code-plugins
                - text: and
                - link "Agent Skills" [ref=e247] [cursor=pointer]:
                  - /url: https://claude.com/blog/skills
                - text: .
              - heading "Manual setup for Claude CodeDirect link to Manual setup for Claude Code" [level=4] [ref=e248]:
                - text: Manual setup for Claude Code
                - link "Direct link to Manual setup for Claude Code" [ref=e249] [cursor=pointer]:
                  - /url: "#manual-setup-for-claude-code"
                  - text: "#"
              - list [ref=e250]:
                - listitem [ref=e251]:
                  - paragraph [ref=e252]:
                    - text: "Run the following command in your terminal to add the Figma MCP to Claude Code:"
                    - code [ref=e253]: claude mcp add --transport http figma https://mcp.figma.com/mcp
                  - generic [ref=e255]:
                    - paragraph [ref=e256]:
                      - strong [ref=e257]: "Tip:"
                      - text: To make your Figma MCP server available across all projects, install it with the
                      - code [ref=e258]: "--scope user"
                      - text: "flag:"
                      - code [ref=e259]: claude mcp add --scope user --transport http figma https://mcp.figma.com/mcp
                    - paragraph [ref=e260]: By default, Claude Code uses local scope, so the server is only available in the current project. Applying the user scope means you don't have to reinstall the server for each of your projects.
                - listitem [ref=e261]:
                  - paragraph [ref=e262]: Start a new instance of Claude Code.
                - listitem [ref=e263]:
                  - paragraph [ref=e264]:
                    - text: Type
                    - code [ref=e265]: /mcp
                    - text: in Claude to manage your MCP Servers and select
                    - strong [ref=e266]: figma
                    - text: .
                    - img "Claude remote MCP manage" [ref=e267]
                - listitem [ref=e268]:
                  - paragraph [ref=e269]:
                    - text: Select
                    - strong [ref=e270]: Authenticate
                    - text: .
                    - img "Select authenticate in Claude" [ref=e271]
                - listitem [ref=e272]:
                  - paragraph [ref=e273]:
                    - text: Click
                    - strong [ref=e274]: Allow Access
                    - text: .
                    - img "Claude remote MCP login" [ref=e275]
                - listitem [ref=e276]:
                  - paragraph [ref=e277]:
                    - text: "Back in Claude code, you should see:"
                    - code [ref=e278]: Authentication successful. Connected to figma
                - listitem [ref=e279]:
                  - paragraph [ref=e280]:
                    - text: Confirm your MCP Server is connected using
                    - code [ref=e281]: /mcp
                    - text: command in Claude Code.
                    - img "Claude remote MCP confirm" [ref=e282]
                - listitem [ref=e283]:
                  - paragraph [ref=e284]: Start prompting!
