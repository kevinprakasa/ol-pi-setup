              - paragraph [ref=e327]: The recommended way to set up the Figma MCP server in Cursor is by installing the Figma plugin, which includes MCP server settings as well as Agent Skills for common workflows.
              - paragraph [ref=e328]: "Install the plugin by typing the following command in Cursor's agent chat:"
