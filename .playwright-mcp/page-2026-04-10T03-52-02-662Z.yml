                - text: .
              - paragraph [ref=e404]: "Sending the live UI of your web app or site to Figma is done through conversation with your MCP client:"
              - list [ref=e405]:
                - listitem [ref=e406]: "Prompt your MCP client: \"Start a local server for my app and capture the UI in a new Figma file.”"
                - listitem [ref=e407]: Follow the steps your client provides. Your client will open a browser window for you, or give you a link to follow.
                - listitem [ref=e408]: Use the capture toolbar to capture pages, elements, and states of your web app or site.
                - listitem [ref=e409]: Let your client know when you're finished. Your client will give you a link to open the Figma file that was created.
              - 'heading "Example: Get design contextDirect link to Example: Get design context" [level=3] [ref=e410]':
