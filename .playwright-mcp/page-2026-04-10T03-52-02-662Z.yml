                  - text: "#"
              - paragraph [ref=e394]: The MCP server introduces a set of tools that help LLMs bring your live UI to Figma Design and get design context from Figma. Once connected, you can start prompting your MCP client.
              - paragraph [ref=e395]:
                - text: For a complete list of tools and examples, see
